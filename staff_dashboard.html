<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GCU Staff Dashboard — Complaints</title>
  <meta name="description" content="Staff complaints management dashboard for GCU departments." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080d1a;
      --surface: #0f1629;
      --card: #141e35;
      --card2: #1a2540;
      --border: #1e2d4a;
      --accent: #6366f1;
      --accent2: #8b5cf6;
      --green: #10b981;
      --yellow: #f59e0b;
      --blue: #3b82f6;
      --red: #ef4444;
      --text: #e2e8f0;
      --muted: #60748b;
    }

    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── LOGIN SCREEN ──────────────────────────────────────── */
    #loginScreen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
      background-image: radial-gradient(ellipse at 30% 40%, rgba(99,102,241,0.12) 0%, transparent 55%),
                        radial-gradient(ellipse at 70% 70%, rgba(139,92,246,0.10) 0%, transparent 55%);
    }
    .login-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 44px 48px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    }
    .login-logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .login-logo .logo-icon {
      width: 64px; height: 64px; background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 16px; display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem; margin: 0 auto 14px;
      box-shadow: 0 8px 24px rgba(99,102,241,0.4);
    }
    .login-logo h1 { font-size: 1.3rem; font-weight: 800; margin-bottom: 4px; }
    .login-logo p  { font-size: 0.85rem; color: var(--muted); }

    .login-label { font-size: 0.82rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .dept-select {
      width: 100%; background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 10px; color: var(--text); font-size: 0.95rem; font-family: inherit;
      padding: 13px 16px; outline: none; transition: border-color .2s;
      margin-bottom: 24px; cursor: pointer;
    }
    .dept-select:focus { border-color: var(--accent); }
    .dept-select option { background: var(--surface); }

    .btn-login {
      width: 100%; padding: 14px; background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; border: none; border-radius: 10px; font-size: 1rem; font-weight: 700;
      cursor: pointer; font-family: inherit; display: flex; align-items: center; justify-content: center;
      gap: 10px; transition: opacity .2s, transform .2s; box-shadow: 0 4px 18px rgba(99,102,241,0.35);
    }
    .btn-login:hover { opacity: 0.9; transform: translateY(-1px); }

    /* ── DASHBOARD ─────────────────────────────────────────── */
    #dashboard { display: none; }

    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 28px;
      background: rgba(15,22,41,0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 50;
    }
    .nav-left { display: flex; align-items: center; gap: 14px; }
    .dept-pill {
      background: rgba(99,102,241,0.15);
      border: 1px solid rgba(99,102,241,0.3);
      color: #a5b4fc;
      padding: 5px 14px; border-radius: 100px;
      font-size: 0.82rem; font-weight: 700; letter-spacing: 0.3px;
    }
    .nav-title { font-size: 1rem; font-weight: 700; }
    .btn-logout {
      background: transparent; border: 1px solid var(--border); color: var(--muted);
      padding: 7px 16px; border-radius: 8px; font-size: 0.82rem; cursor: pointer;
      font-family: inherit; transition: all .2s;
    }
    .btn-logout:hover { border-color: var(--red); color: var(--red); }

    main { padding: 28px; max-width: 1300px; margin: 0 auto; }

    /* Stats bar */
    .stats-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 14px; margin-bottom: 28px; }
    .stat-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 12px;
      padding: 18px 20px; transition: transform .2s;
    }
    .stat-card:hover { transform: translateY(-2px); }
    .stat-num { font-size: 2rem; font-weight: 800; margin-bottom: 4px; }
    .stat-label { font-size: 0.78rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; }
    .num-yellow { color: var(--yellow); }
    .num-blue   { color: var(--blue); }
    .num-green  { color: var(--green); }
    .num-red    { color: var(--red); }

    /* Toolbar */
    .toolbar { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; }
    .toolbar-title { font-size: 1rem; font-weight: 700; }
    .filter-group { display: flex; gap: 8px; }
    .filter-btn {
      padding: 7px 16px; background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 8px; color: var(--muted); font-size: 0.82rem; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: all .2s;
    }
    .filter-btn.active, .filter-btn:hover { border-color: var(--accent); color: var(--text); }
    .refresh-btn {
      padding: 8px 16px; background: rgba(99,102,241,0.12); border: 1px solid rgba(99,102,241,0.3);
      border-radius: 8px; color: var(--accent); font-size: 0.85rem; font-weight: 600;
      cursor: pointer; font-family: inherit; display: flex; align-items: center; gap: 6px;
      transition: background .2s;
    }
    .refresh-btn:hover { background: rgba(99,102,241,0.22); }

    /* Kanban */
    .kanban { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 18px; }
    .kanban-col {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 16px; min-height: 200px;
    }
    .col-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px;
    }
    .col-title {
      font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px;
      display: flex; align-items: center; gap: 8px;
    }
    .col-count {
      font-size: 0.78rem; font-weight: 700; padding: 2px 9px;
      border-radius: 100px;
    }
    .col-Pending    .col-title { color: var(--yellow); }
    .col-Pending    .col-count { background: rgba(245,158,11,0.2); color: var(--yellow); }
    .col-InProgress .col-title { color: var(--blue); }
    .col-InProgress .col-count { background: rgba(59,130,246,0.2); color: var(--blue); }
    .col-Resolved   .col-title { color: var(--green); }
    .col-Resolved   .col-count { background: rgba(16,185,129,0.2); color: var(--green); }
    .col-Rejected   .col-title { color: var(--red); }
    .col-Rejected   .col-count { background: rgba(239,68,68,0.2); color: var(--red); }

    /* Complaint card */
    .complaint-card {
      background: var(--card2); border: 1px solid var(--border); border-radius: 10px;
      padding: 14px; margin-bottom: 10px; cursor: pointer;
      transition: transform .15s, box-shadow .15s;
    }
    .complaint-card:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,0.25); }
    .cid { font-size: 0.78rem; font-weight: 700; color: var(--accent); margin-bottom: 6px; }
    .cdesc { font-size: 0.88rem; line-height: 1.5; color: var(--text); margin-bottom: 8px;
             display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .cmeta { display: flex; gap: 8px; flex-wrap: wrap; }
    .ctag {
      padding: 3px 10px; border-radius: 100px; font-size: 0.72rem; font-weight: 600;
    }
    .ctag-cat  { background: rgba(99,102,241,0.15); color: #a5b4fc; }
    .ctag-date { background: rgba(96,116,139,0.15); color: var(--muted); }

    /* Detail panel */
    #detailPanel {
      position: fixed; right: 0; top: 0; bottom: 0; width: 420px;
      background: var(--card); border-left: 1px solid var(--border);
      padding: 28px; overflow-y: auto; z-index: 200;
      transform: translateX(100%); transition: transform .3s ease;
      box-shadow: -8px 0 32px rgba(0,0,0,0.4);
    }
    #detailPanel.open { transform: translateX(0); }
    .panel-close {
      background: var(--surface); border: 1px solid var(--border); color: var(--muted);
      width: 32px; height: 32px; border-radius: 8px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; font-size: 0.95rem;
      margin-bottom: 20px; transition: all .2s;
    }
    .panel-close:hover { color: var(--text); border-color: var(--text); }

    .detail-id { font-size: 0.8rem; font-weight: 700; color: var(--accent); margin-bottom: 4px; }
    .detail-desc { font-size: 0.95rem; line-height: 1.6; color: var(--text); margin-bottom: 18px; }
    .detail-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .detail-row .dlabel { font-size: 0.78rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .detail-row .dval   { font-size: 0.88rem; font-weight: 600; }

    .dpanel-section { margin-bottom: 22px; }
    .dpanel-section-title { font-size: 0.78rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 10px; }

    .status-select {
      width: 100%; background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 8px; color: var(--text); font-family: inherit; font-size: 0.9rem;
      padding: 10px 14px; outline: none; margin-bottom: 10px;
    }
    .btn-update {
      width: 100%; padding: 11px; background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; border: none; border-radius: 8px; font-size: 0.9rem; font-weight: 700;
      cursor: pointer; font-family: inherit; transition: opacity .2s;
    }
    .btn-update:hover { opacity: 0.88; }

    .comment-area {
      width: 100%; background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 8px; color: var(--text); font-family: inherit; font-size: 0.9rem;
      padding: 10px 14px; outline: none; resize: none; min-height: 80px; margin-bottom: 10px;
    }
    .comment-area:focus { border-color: var(--accent); }
    .btn-comment {
      width: 100%; padding: 10px; background: rgba(99,102,241,0.15);
      border: 1px solid rgba(99,102,241,0.3); border-radius: 8px; color: var(--accent);
      font-size: 0.88rem; font-weight: 700; cursor: pointer; font-family: inherit; transition: background .2s;
    }
    .btn-comment:hover { background: rgba(99,102,241,0.25); }

    .timeline-item { display: flex; gap: 12px; margin-bottom: 12px; }
    .tdot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); margin-top: 5px; flex-shrink: 0; }
    .tmeta { font-size: 0.72rem; color: var(--muted); margin-bottom: 3px; }
    .tmsg  { font-size: 0.85rem; color: var(--text); }

    /* Toast */
    #toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--card); border: 1px solid var(--border); border-radius: 10px;
      padding: 12px 18px; font-size: 0.88rem;
      display: none; align-items: center; gap: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4); z-index: 999;
    }
    #toast.show { display: flex; }

    /* Empty state */
    .empty-state { text-align: center; padding: 28px 14px; color: var(--muted); font-size: 0.85rem; }
    .empty-state i { font-size: 2rem; margin-bottom: 8px; display: block; opacity: 0.4; }
  </style>
</head>
<body>

<!-- ── LOGIN SCREEN ──────────────────────────────────────────── -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon">🏢</div>
      <h1>Staff Dashboard</h1>
      <p>GCU Complaint Management System</p>
    </div>

    <div class="login-label">Select Your Department</div>
    <select class="dept-select" id="deptSelect">
      <option value="">— Choose Department —</option>
      <option value="technical_staff">⚡ Technical Staff</option>
      <option value="cleaning_head">🧹 Cleaning Head</option>
      <option value="maintenance_team">🔧 Maintenance Team</option>
      <option value="IT_support">💻 IT Support</option>
      <option value="admin">🛡 Admin (All Complaints)</option>
    </select>

    <button class="btn-login" onclick="doLogin()">
      <i class="fas fa-sign-in-alt"></i> Enter Dashboard
    </button>
  </div>
</div>

<!-- ── DASHBOARD ─────────────────────────────────────────────── -->
<div id="dashboard">
  <nav>
    <div class="nav-left">
      <div class="nav-title">🏢 Staff Dashboard</div>
      <div class="dept-pill" id="navDept">–</div>
    </div>
    <div style="display:flex;gap:10px;align-items:center;">
      <button class="refresh-btn" onclick="loadComplaints()"><i class="fas fa-sync"></i> Refresh</button>
      <button class="btn-logout" onclick="doLogout()">Logout</button>
    </div>
  </nav>

  <main>
    <div class="stats-bar">
      <div class="stat-card">
        <div class="stat-num" id="statTotal">0</div>
        <div class="stat-label">Total</div>
      </div>
      <div class="stat-card">
        <div class="stat-num num-yellow" id="statPending">0</div>
        <div class="stat-label">Pending</div>
      </div>
      <div class="stat-card">
        <div class="stat-num num-blue" id="statProgress">0</div>
        <div class="stat-label">In Progress</div>
      </div>
      <div class="stat-card">
        <div class="stat-num num-green" id="statResolved">0</div>
        <div class="stat-label">Resolved</div>
      </div>
      <div class="stat-card">
        <div class="stat-num num-red" id="statRejected">0</div>
        <div class="stat-label">Rejected</div>
      </div>
    </div>

    <div class="toolbar">
      <div class="toolbar-title">Complaints Board</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <div class="filter-group" id="filterGroup">
          <button class="filter-btn active" onclick="filterCards('All', this)">All</button>
          <button class="filter-btn" onclick="filterCards('Pending', this)">🟡 Pending</button>
          <button class="filter-btn" onclick="filterCards('In Progress', this)">🔵 In Progress</button>
          <button class="filter-btn" onclick="filterCards('Resolved', this)">🟢 Resolved</button>
          <button class="filter-btn" onclick="filterCards('Rejected', this)">🔴 Rejected</button>
        </div>
      </div>
    </div>

    <div class="kanban" id="kanbanBoard">
      <!-- generated -->
    </div>
  </main>
</div>

<!-- ── DETAIL PANEL ──────────────────────────────────────────── -->
<div id="detailPanel">
  <button class="panel-close" onclick="closePanel()"><i class="fas fa-times"></i></button>

  <div class="dpanel-section">
    <div class="detail-id" id="panelId">–</div>
    <div class="detail-desc" id="panelDesc">–</div>
    <div class="detail-row"><span class="dlabel">Category</span><span class="dval" id="panelCat">–</span></div>
    <div class="detail-row"><span class="dlabel">Status</span><span class="dval" id="panelStatus">–</span></div>
    <div class="detail-row"><span class="dlabel">Student</span><span class="dval" id="panelStudent">–</span></div>
    <div class="detail-row"><span class="dlabel">Location</span><span class="dval" id="panelLocation">–</span></div>
    <div class="detail-row"><span class="dlabel">Submitted</span><span class="dval" id="panelDate">–</span></div>
  </div>

  <div class="dpanel-section">
    <div class="dpanel-section-title">Update Status</div>
    <select class="status-select" id="newStatus">
      <option value="Pending">🟡 Pending</option>
      <option value="In Progress">🔵 In Progress</option>
      <option value="Resolved">🟢 Resolved</option>
      <option value="Rejected">🔴 Rejected</option>
    </select>
    <button class="btn-update" onclick="updateStatus()">✅ Update Status</button>
  </div>

  <div class="dpanel-section">
    <div class="dpanel-section-title">Add Comment / Resolution</div>
    <textarea class="comment-area" id="commentText" placeholder="Add a resolution note or ask for more info…"></textarea>
    <button class="btn-comment" onclick="addComment()"><i class="fas fa-comment"></i> Post Comment</button>
  </div>

  <div class="dpanel-section">
    <div class="dpanel-section-title">Activity Timeline</div>
    <div id="timeline">–</div>
  </div>
</div>

<!-- Toast -->
<div id="toast"><i class="fas fa-info-circle" style="color:var(--accent)"></i><span id="toastMsg"></span></div>

<script>
  let currentDept = null;
  let allComplaints = [];
  let currentComplaintId = null;

  function showToast(msg, icon='fa-info-circle', color='var(--accent)') {
    const t = document.getElementById('toast');
    t.querySelector('i').className = 'fas ' + icon;
    t.querySelector('i').style.color = color;
    document.getElementById('toastMsg').textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3200);
  }

  function doLogin() {
    const dept = document.getElementById('deptSelect').value;
    if (!dept) { showToast('Please select a department', 'fa-exclamation', 'var(--yellow)'); return; }
    currentDept = dept;
    const label = document.querySelector(`#deptSelect option[value="${dept}"]`).textContent;
    document.getElementById('navDept').textContent = label;
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadComplaints();
  }

  function doLogout() {
    currentDept = null;
    allComplaints = [];
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('dashboard').style.display = 'none';
    closePanel();
  }

  async function loadComplaints() {
    try {
      const url = currentDept === 'admin'
        ? '/api/complaints/all'
        : `/api/complaints/dept/${currentDept}`;
      const res = await fetch(url);
      allComplaints = await res.json();
      updateStats();
      renderKanban(allComplaints);
    } catch (e) {
      showToast('Failed to load complaints', 'fa-exclamation-triangle', 'var(--red)');
    }
  }

  function updateStats() {
    const by = { Pending: 0, 'In Progress': 0, Resolved: 0, Rejected: 0 };
    allComplaints.forEach(c => { if (by[c.status] !== undefined) by[c.status]++; });
    document.getElementById('statTotal').textContent = allComplaints.length;
    document.getElementById('statPending').textContent  = by['Pending'];
    document.getElementById('statProgress').textContent = by['In Progress'];
    document.getElementById('statResolved').textContent = by['Resolved'];
    document.getElementById('statRejected').textContent = by['Rejected'];
  }

  function renderKanban(list) {
    const cols = {
      'Pending':     { label: '🟡 Pending',     class: 'col-Pending',    items: [] },
      'In Progress': { label: '🔵 In Progress',  class: 'col-InProgress', items: [] },
      'Resolved':    { label: '🟢 Resolved',     class: 'col-Resolved',   items: [] },
      'Rejected':    { label: '🔴 Rejected',     class: 'col-Rejected',   items: [] },
    };
    list.forEach(c => { if (cols[c.status]) cols[c.status].items.push(c); });

    const board = document.getElementById('kanbanBoard');
    board.innerHTML = Object.entries(cols).map(([status, col]) => `
      <div class="kanban-col ${col.class}">
        <div class="col-header">
          <div class="col-title">${col.label}</div>
          <div class="col-count">${col.items.length}</div>
        </div>
        ${col.items.length === 0
          ? `<div class="empty-state"><i class="fas fa-inbox"></i>No complaints</div>`
          : col.items.map(c => `
            <div class="complaint-card" onclick="openPanel('${c.complaint_id}')">
              <div class="cid">${c.complaint_id}</div>
              <div class="cdesc">${escHtml(c.description)}</div>
              <div class="cmeta">
                <span class="ctag ctag-cat">${c.category || 'Other'}</span>
                <span class="ctag ctag-date">${c.created_at ? c.created_at.slice(0,10) : ''}</span>
              </div>
            </div>`).join('')
        }
      </div>
    `).join('');
  }

  function filterCards(status, btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const filtered = status === 'All' ? allComplaints : allComplaints.filter(c => c.status === status);
    renderKanban(filtered);
  }

  async function openPanel(id) {
    currentComplaintId = id;
    try {
      const res = await fetch(`/api/complaints/${id}`);
      const data = await res.json();

      document.getElementById('panelId').textContent       = data.complaint_id;
      document.getElementById('panelDesc').textContent     = data.description;
      document.getElementById('panelCat').textContent      = data.category || '–';
      document.getElementById('panelStatus').textContent   = data.status;
      document.getElementById('panelStudent').textContent  = data.student_name || 'Anonymous';
      document.getElementById('panelLocation').textContent = data.location || 'Not specified';
      document.getElementById('panelDate').textContent     = data.created_at ? data.created_at.slice(0,10) : '–';
      document.getElementById('newStatus').value           = data.status;

      const tl = document.getElementById('timeline');
      const comments = data.comments || [];
      tl.innerHTML = `
        <div class="timeline-item">
          <div class="tdot" style="background:var(--green)"></div>
          <div>
            <div class="tmeta">${data.created_at ? data.created_at.replace('T',' ').slice(0,16) : ''}</div>
            <div class="tmsg">Complaint submitted – routed to <strong>${(data.department||'').replace(/_/g,' ')}</strong></div>
          </div>
        </div>
        ${comments.map(c => `
          <div class="timeline-item">
            <div class="tdot"></div>
            <div>
              <div class="tmeta">${c.created_at.replace('T',' ').slice(0,16)} · <span style="color:var(--accent);font-weight:600">${c.author} (${c.author_role})</span></div>
              <div class="tmsg">${escHtml(c.message)}</div>
            </div>
          </div>`).join('')}
      `;

      document.getElementById('detailPanel').classList.add('open');
    } catch (e) {
      showToast('Could not load complaint details', 'fa-exclamation-triangle', 'var(--red)');
    }
  }

  function closePanel() {
    document.getElementById('detailPanel').classList.remove('open');
    currentComplaintId = null;
  }

  async function updateStatus() {
    if (!currentComplaintId) return;
    const status = document.getElementById('newStatus').value;
    try {
      const res = await fetch(`/api/complaints/${currentComplaintId}/status`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status })
      });
      if (!res.ok) throw new Error();
      showToast('Status updated!', 'fa-check-circle', 'var(--green)');
      closePanel();
      await loadComplaints();
    } catch {
      showToast('Update failed', 'fa-exclamation-triangle', 'var(--red)');
    }
  }

  async function addComment() {
    if (!currentComplaintId) return;
    const msg = document.getElementById('commentText').value.trim();
    if (!msg) { showToast('Type a comment first', 'fa-exclamation', 'var(--yellow)'); return; }

    const fd = new FormData();
    fd.append('message', msg);
    fd.append('author', document.querySelector(`#deptSelect option[value="${currentDept}"]`)?.textContent || 'Staff');
    fd.append('author_role', 'staff');

    try {
      const res = await fetch(`/api/complaints/${currentComplaintId}/comment`, { method: 'POST', body: fd });
      if (!res.ok) throw new Error();
      document.getElementById('commentText').value = '';
      showToast('Comment posted!', 'fa-check-circle', 'var(--green)');
      await openPanel(currentComplaintId);  // refresh panel
    } catch {
      showToast('Failed to post comment', 'fa-exclamation-triangle', 'var(--red)');
    }
  }

  function escHtml(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
